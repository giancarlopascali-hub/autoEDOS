name: Sync to Hugging Face
on:
  push:
    branches: [main]
jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "giancarlo.pascali@gmail.com"
          git config --global user.name "Giancarlo Pascali"
          # Clone the HF repo
          git clone https://realgcp:$HF_TOKEN@huggingface.co/spaces/realgcp/autoEDOS hf_repo
          
          # Sync essentials + UI assets (logo, banner)
          # We now INCLUDE .ico and .png by removing them from the exclude list
          rsync -av --delete \
            --exclude='.git' \
            --exclude='dist' \
            --exclude='edboplus' \
            --exclude='archive' \
            --exclude='Model functions' \
            --exclude='*.md' \
            --exclude='*.pdf' \
            --exclude='benchmark_*.py' \
            --exclude='generate_*.py' \
            --exclude='finalize_benchmark.py' \
            autoEDOS/ hf_repo/

          
          # Commit and push
          cd hf_repo
          # HF requires LFS for binaries
          git lfs install
          git lfs track "*.png"
          git lfs track "*.ico"
          git lfs track "*.jpg"
          git add .
          git commit -m "Sync from GitHub (LFS optimized)" || echo "No changes to commit"
          git push origin main

