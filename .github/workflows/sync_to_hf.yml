name: Sync to Hugging Face
on:
  push:
    branches: [main]
jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "giancarlo.pascali@gmail.com"
          git config --global user.name "Giancarlo Pascali"
          # Clone the HF repo
          git clone https://realgcp:$HF_TOKEN@huggingface.co/spaces/realgcp/autoEDOS hf_repo
          # Sync autoEDOS folder to hf_repo root
          # We exclude .git, dist/ (heavy build files), and edboplus (heavy tutorial/bench files)
          rsync -av --delete --exclude='.git' --exclude='dist' --exclude='edboplus' autoEDOS/ hf_repo/
          # Commit and push
          cd hf_repo
          # Handle potential LFS pointer issues in CI by allowing incomplete pushes
          git config lfs.allowincompletepush true
          git add .
          git commit -m "Sync from GitHub (optimized sync v3)" || echo "No changes to commit"
          git push origin main




