name: Sync to Hugging Face
on:
  push:
    branches: [main]
jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "giancarlo.pascali@gmail.com"
          git config --global user.name "Giancarlo Pascali"
          # Clone the HF repo
          git clone https://realgcp:$HF_TOKEN@huggingface.co/spaces/realgcp/autoEDOS hf_repo
          
          # Sync ONLY the absolute essentials to hf_repo root
          # We exclude EVERYTHING and then include only what is needed.
          # More simply, we exclude all known heavy/unnecessary folders and file patterns.
          rsync -av --delete \
            --exclude='.git' \
            --exclude='dist' \
            --exclude='edboplus' \
            --exclude='archive' \
            --exclude='Model functions' \
            --exclude='*.md' \
            --exclude='*.pdf' \
            --exclude='*.xlsx' \
            --exclude='*.ico' \
            --exclude='benchmark_*.py' \
            --exclude='generate_*.py' \
            --exclude='finalize_benchmark.py' \
            --exclude='static/banner.png' \
            autoEDOS/ hf_repo/
          
          # Commit and push
          cd hf_repo
          git add .
          git commit -m "Sync from GitHub (Bare Essentials Only)" || echo "No changes to commit"
          git push origin main
